<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Paper Galaxy</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/graph.js" defer></script>
    <script src="/static/app.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true"></div>
          <div>
            <h1>Paper Galaxy</h1>
            <p id="project-status">Checking local database...</p>
          </div>
        </div>
        <div class="topbar-hint">Local graph workspace - index from CLI</div>
        <div class="status-strip" aria-live="polite">
          <div>
            <span class="metric-label">Active</span>
            <strong id="active-count">0</strong>
          </div>
          <div>
            <span class="metric-label">Missing</span>
            <strong id="missing-count">0</strong>
          </div>
          <div>
            <span class="metric-label">Unindexed</span>
            <strong id="unindexed-count">0</strong>
          </div>
          <div class="wide-metric">
            <span class="metric-label">Last scan</span>
            <strong id="last-scan">none</strong>
          </div>
        </div>
        <button id="theme-toggle" class="icon-button" type="button" aria-label="Toggle theme">
          <span aria-hidden="true">◐</span>
        </button>
      </header>

      <main class="workspace">
        <aside class="sidebar" aria-label="Search and clusters">
          <section class="panel">
            <h2>Search</h2>
            <form id="search-form" class="search-form">
              <input
                id="search-input"
                name="q"
                type="search"
                placeholder="Search indexed text"
                autocomplete="off"
              >
              <button type="submit">Search</button>
            </form>
            <label class="check-row">
              <input id="include-missing" type="checkbox">
              <span>Include missing</span>
            </label>
            <div id="search-results" class="result-list"></div>
          </section>

          <section class="panel">
            <div class="panel-title-row">
              <h2>Clusters</h2>
              <span class="panel-kicker">groups</span>
            </div>
            <input
              id="point-filter"
              class="filter-input"
              type="search"
              placeholder="Filter visible points"
              autocomplete="off"
            >
            <div id="cluster-legend" class="legend"></div>
          </section>

          <section class="panel settings-panel">
            <div class="panel-title-row">
              <h2>Forces</h2>
              <span class="panel-kicker">local</span>
            </div>
            <label class="toggle-row">
              <input id="animate-toggle" type="checkbox" checked>
              <span>Animate graph</span>
            </label>
            <label class="toggle-row">
              <input id="arrows-toggle" type="checkbox">
              <span>Show arrows</span>
            </label>
            <label class="range-row">
              <span>Center</span>
              <input id="center-force" type="range" min="0" max="20" step="1" value="7">
            </label>
            <label class="range-row">
              <span>Repel</span>
              <input id="repel-force" type="range" min="200" max="3600" step="100" value="1600">
            </label>
            <label class="range-row">
              <span>Link force</span>
              <input id="link-force" type="range" min="1" max="60" step="1" value="18">
            </label>
            <label class="range-row">
              <span>Link distance</span>
              <input id="link-distance" type="range" min="54" max="220" step="2" value="118">
            </label>
            <label class="range-row">
              <span>Node size</span>
              <input id="node-size" type="range" min="4" max="13" step="1" value="7">
            </label>
            <label class="range-row">
              <span>Link width</span>
              <input id="link-thickness" type="range" min="0.5" max="3" step="0.1" value="1.1">
            </label>
            <label class="range-row">
              <span>Label mode</span>
              <select id="label-mode">
                <option value="focus" selected>Focus labels only</option>
                <option value="zoom">Show at high zoom</option>
                <option value="always">Always show labels</option>
              </select>
            </label>
            <label class="range-row">
              <span>Zoom labels</span>
              <input id="label-threshold" type="range" min="0.4" max="2.2" step="0.1" value="1.4">
            </label>
          </section>
        </aside>

        <section class="graph-stage" aria-label="Document graph">
          <div class="graph-titlebar">
            <div>
              <h2>Document Graph</h2>
              <p id="map-caption">Loading active indexed documents...</p>
            </div>
            <div class="graph-controls" aria-label="Graph controls">
              <select id="map-run-select" class="map-run-select" aria-label="Saved map run">
                <option value="">Live map</option>
              </select>
              <button id="reset-view" class="icon-button" type="button" aria-label="Reset view">
                <span aria-hidden="true">⌖</span>
              </button>
              <button id="reset-layout" class="icon-button" type="button" aria-label="Reset layout">
                <span aria-hidden="true">↺</span>
              </button>
              <button id="pause-graph" class="icon-button" type="button" aria-label="Pause animation">
                <span aria-hidden="true">Ⅱ</span>
              </button>
              <button id="reset-selection" class="icon-button" type="button" aria-label="Clear selection">
                <span aria-hidden="true">×</span>
              </button>
            </div>
          </div>
          <div id="map-empty" class="empty-state" hidden></div>
          <svg
            id="map-svg"
            class="graph-svg"
            role="img"
            aria-label="Paper Galaxy document similarity graph"
          ></svg>
        </section>

        <aside class="inspector" aria-label="Document inspector">
          <section class="panel inspector-panel">
            <h2>Inspector</h2>
            <div id="inspector-content" class="inspector-content">
              <p class="muted">Select a document point or search result.</p>
            </div>
          </section>
        </aside>
      </main>
    </div>
  </body>
</html>
