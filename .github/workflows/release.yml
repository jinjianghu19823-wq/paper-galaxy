name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e ".[dev,ml,pdf,app]"

      - name: Ruff lint
        run: python -m ruff check .

      - name: Ruff format check
        run: python -m ruff format . --check

      - name: Mypy
        run: python -m mypy src

      - name: Pytest
        run: python -m pytest

      - name: Build package
        run: python -m build

      - name: Build demo site
        run: python scripts/build_demo_site.py --out site_dist

      - name: Check demo site
        run: python scripts/check_demo_site.py --dist site_dist

      - name: Public readiness audit
        run: python scripts/public_readiness_check.py --strict --require-site-dist

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
