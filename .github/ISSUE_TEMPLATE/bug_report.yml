name: Bug report
description: Report a reproducible Paper Galaxy problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not paste private document text,
        API keys, local secrets, or sensitive corpus contents.
  - type: input
    id: os
    attributes:
      label: Operating system
      description: macOS, Linux, Windows, WSL, etc.
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.9"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Paper Galaxy version
      placeholder: "paper-galaxy --version or package version"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command run
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      description: Redact local paths or document text if needed.
      render: text
  - type: dropdown
    id: sensitive
    attributes:
      label: Does your corpus contain sensitive data?
      options:
        - "Yes, and I have redacted details"
        - "No"
        - "Not sure"
    validations:
      required: true
