        <h1>未来：个人云端库</h1>
        <p class="lead">这只是设计文档。Paper Galaxy 目前没有云同步、托管索引、账号、支付、遥测或文档上传功能。</p>
        <p>建议路线是分阶段推进：先保持本地优先默认体验，再考虑可选的加密备份库，最后才评估元数据同步或托管计算。</p>
        <a class="button primary" href="https://github.com/jinjianghu19823-wq/paper-galaxy/tree/main/docs/cloud-library">阅读设计文档</a>
      </div>
      <aside class="card">
        <h3>原则</h3>
        <p>用户拥有资料库；今天不需要账号；上传边界必须明确；优先考虑加密存储、导出/删除控制和自托管可能性。</p>
      </aside>
